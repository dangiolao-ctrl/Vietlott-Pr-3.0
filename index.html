<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Spin Pro</title>

<style>
body{
margin:0;
padding:15px;
font-family:Arial;
background:linear-gradient(135deg,#fff3cd,#ffe0b2);
text-align:center;
}

.header{
background:#c62828;
color:#ffeb3b;
padding:15px;
font-size:24px;
font-weight:bold;
border-radius:15px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
font-size:16px;
}

button{
background:#d32f2f;
color:#ffeb3b;
border:none;
font-weight:bold;
}

.ball{
width:55px;
height:55px;
display:inline-flex;
align-items:center;
justify-content:center;
border-radius:50%;
margin:5px;
font-size:20px;
font-weight:bold;
background:radial-gradient(circle,#fff176,#fbc02d);
}

.ball.hot{
background:radial-gradient(circle,#ffeb3b,#ff9800);
transform:scale(1.15);
}

#result{
margin-top:10px;
}

.score{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#2e7d32;
}
</style>
</head>

<body>

<div class="header">🎰 VIETLOTT SPIN MACHINE</div>

<div class="card">

<select id="game">
<option value="645">Mega 6/45</option>
<option value="655">Power 6/55</option>
<option value="3d">3D Max Pro</option>
</select>

<select id="mode">
<option value="random">🎲 Ngẫu nhiên</option>
<option value="tuvi">🔮 Tử vi</option>
<option value="hopmenh">🍀 Hợp mệnh</option>
</select>

<button onclick="spin()">QUAY NGAY</button>

</div>

<div class="card">

<div id="result"></div>
<div id="score"></div>

</div>

<script>

let lucky=[2,5,8]; // demo (bạn có thể nối tử vi sau)

function rand(max){
return Math.floor(Math.random()*max)+1;
}

/* ================= SPIN EFFECT ================= */
function startSpin(el,max,final,delay,pad){

let t=setInterval(()=>{

let fake = rand(max);
el.innerText = fake.toString().padStart(pad,"0");

},80);

setTimeout(()=>{

clearInterval(t);
el.innerText = final.toString().padStart(pad,"0");

},delay);

}

/* ================= GENERATE ================= */
function gen(game){

let max = game==="645"?45 : game==="655"?55 : 999;
let count = game==="3d"?2:6;

let nums=[];

for(let i=0;i<count;i++){
nums.push(rand(max));
}

return nums;
}

/* ================= MAIN ================= */
function spin(){

let game=document.getElementById("game").value;

let box=document.getElementById("result");
let score=document.getElementById("score");

box.innerHTML="";

let nums=gen(game);

nums.forEach((n,i)=>{

let d=document.createElement("div");
d.className="ball";

box.appendChild(d);

/* spin delay từng bóng cho giống máy thật */
startSpin(
d,
(game==="645")?45:(game==="655")?55:999,
n,
1000 + i*300,
(game==="3d")?3:2
);

});

score.innerHTML="⏳ Đang quay...";

setTimeout(()=>{
score.innerHTML="✔ Quay xong!";
},2500);

}

</script>

</body>
</html>

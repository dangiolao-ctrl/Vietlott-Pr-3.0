<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Full Pro</title>

<style>
body{
margin:0;
padding:15px;
font-family:Arial;
background:linear-gradient(135deg,#fff3cd,#ffe0b2);
text-align:center;
}

.header{
background:#c62828;
color:#ffeb3b;
padding:15px;
font-size:24px;
font-weight:bold;
border-radius:15px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
font-size:15px;
}

select,input{
border:2px solid #fbc02d;
}

button{
border:none;
background:#d32f2f;
color:#ffeb3b;
font-weight:bold;
}

.ball{
width:55px;
height:55px;
display:inline-flex;
justify-content:center;
align-items:center;
border-radius:50%;
margin:5px;
font-size:20px;
font-weight:bold;
background:radial-gradient(circle,#fff176,#fbc02d);
}

.ball.hot{
background:radial-gradient(circle,#ffeb3b,#ff9800);
transform:scale(1.1);
}

.section{
font-weight:bold;
margin:10px 0;
color:#c62828;
}

.score{
font-size:18px;
font-weight:bold;
color:#2e7d32;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🎰 VIETLOTT FULL PRO + 🔮 TỬ VI</div>

<!-- ================= TỬ VI ================= -->
<div class="card">

<div class="section">🔮 Tử vi</div>

<input id="name" placeholder="Họ tên">

<select id="gender">
<option>Nam</option>
<option>Nữ</option>
</select>

<input id="day" type="number" placeholder="Ngày">
<input id="month" type="number" placeholder="Tháng">
<input id="year" type="number" placeholder="Năm">

<select id="hour">
<option value="ty">Tý</option>
<option value="suu">Sửu</option>
<option value="dan">Dần</option>
<option value="mao">Mão</option>
<option value="thin">Thìn</option>
<option value="ty2">Tỵ</option>
<option value="ngo">Ngọ</option>
<option value="mui">Mùi</option>
<option value="than">Thân</option>
<option value="dau">Dậu</option>
<option value="tuat">Tuất</option>
<option value="hoi">Hợi</option>
</select>

<button onclick="calcTuVi()">TÍNH TỬ VI</button>

<div id="tuviBox"></div>

</div>

<!-- ================= VIETLOTT ================= -->
<div class="card">

<div class="section">🎰 Vietlott</div>

<select id="game">
<option value="645">Mega 6/45</option>
<option value="655">Power 6/55</option>
<option value="3d">3D Max Pro</option>
</select>

<select id="mode">
<option value="random">🎲 Ngẫu nhiên</option>
<option value="tuvi">🔮 Tử vi</option>
<option value="hopmenh">🍀 Hợp mệnh</option>
</select>

<button onclick="quay()">QUAY NGAY</button>

</div>

<!-- ================= RESULT ================= -->
<div class="card">

<div class="section">🎯 Kết quả</div>
<div id="result"></div>
<div id="score"></div>

</div>

<script>

let lucky=[];

/* ================= TỬ VI ================= */
function calcTuVi(){

let d=Number(day.value);
let m=Number(month.value);
let y=Number(year.value);

if(!d||!m||!y){
alert("Nhập đủ ngày tháng năm");
return;
}

let age=new Date().getFullYear()-y;

let a=(d+age)%10;
let b=(m+age)%10;
let c=(d+m+age)%10;

lucky=[a,b,c];

tuviBox.innerHTML=
"⭐ Số may mắn: <b>"+lucky.join(" - ")+"</b>";
}

/* ================= RANDOM ================= */
function rand(max){
return Math.floor(Math.random()*max)+1;
}

/* ================= PICK ================= */
function pick(max,force){

if(lucky.length && Math.random()<force){
let p=lucky[Math.floor(Math.random()*lucky.length)];
return Math.min(max,Math.max(1,p+rand(3)));
}

return rand(max);
}

/* ================= SPIN ================= */
function spin(el,max,final,pad){

let t=setInterval(()=>{
el.innerText = rand(max).toString().padStart(pad,"0");
},80);

setTimeout(()=>{
clearInterval(t);
el.innerText = final.toString().padStart(pad,"0");
},1200);
}

/* ================= GENERATE ================= */
function gen(game,mode){

let nums=[];
let max = game==="645"?45 : game==="655"?55 : 999;
let count = game==="3d"?2:6;

for(let i=0;i<count;i++){

if(mode==="random"){
nums.push(rand(max));
}

else if(mode==="tuvi"){
nums.push(pick(max,0.6));
}

else{
nums.push(pick(max,0.9));
}

}

return nums;
}

/* ================= QUAY ================= */
function quay(){

let game=document.getElementById("game").value;
let mode=document.getElementById("mode").value;

let nums=gen(game,mode);

let box=document.getElementById("result");
let sc=document.getElementById("score");

box.innerHTML="";

nums.forEach((n,i)=>{

let d=document.createElement("div");
d.className="ball";

box.appendChild(d);

/* spin delay */
setTimeout(()=>{
spin(d,(game==="645")?45:(game==="655")?55:999,n,(game==="3d")?3:2);
},i*200);

});

sc.innerHTML="⏳ Đang quay...";

setTimeout(()=>{
sc.innerHTML="✔ Hoàn tất!";
},2000);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Hợp Mệnh Pro</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
padding:15px;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff7e6,#ffe9e9);
text-align:center;
}

.header{
background:#c62828;
color:#fff;
padding:15px;
border-radius:15px;
font-size:26px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

select,input,button{
width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
margin-top:8px;
}

select,input{
border:2px solid #fbc02d;
}

button{
border:none;
background:#d32f2f;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.ball{
width:55px;
height:55px;
display:inline-flex;
justify-content:center;
align-items:center;
border-radius:50%;
margin:5px;
font-size:20px;
font-weight:bold;
background:radial-gradient(circle,#fff176,#fbc02d);
transition:0.2s;
}

.ball.hot{
background:radial-gradient(circle,#ffeb3b,#ff9800);
transform:scale(1.1);
box-shadow:0 0 10px rgba(255,152,0,.8);
}

.resultTitle{
font-size:20px;
font-weight:bold;
margin:10px 0;
color:#c62828;
}

.scoreBox{
font-size:18px;
font-weight:bold;
margin-top:10px;
color:#2e7d32;
}

.small{
font-size:14px;
color:#555;
}
</style>
</head>

<body>

<div class="header">🎰 Vietlott Hợp Mệnh + Score</div>

<!-- ================= INPUT ================= -->
<div class="card">

<div class="resultTitle">🔮 Tử vi</div>

<input id="birthYear" type="number" placeholder="Nhập năm sinh">

<button onclick="calcTuVi()">Xem tử vi</button>

<div id="tuviBox" class="small" style="margin-top:10px;">
Chưa có dữ liệu
</div>

</div>

<!-- ================= MODE ================= -->
<div class="card">

<div class="resultTitle">⚙️ Chế độ</div>

<select id="mode">
<option value="random">🎲 Ngẫu nhiên</option>
<option value="tuvi">🔮 Tử vi</option>
<option value="hopmenh">🍀 Hợp mệnh</option>
</select>

<button onclick="quay()">QUAY NGAY</button>

</div>

<!-- ================= RESULT ================= -->
<div class="card">

<div class="resultTitle">🎰 Kết quả</div>

<div id="result">Chưa có kết quả</div>

<div id="score" class="scoreBox"></div>

</div>

<script>

let lucky=[];
let ageUser=0;

/* ================= TỬ VI ================= */
function calcTuVi(){

let y=document.getElementById("birthYear").value;
if(!y){alert("Nhập năm sinh!");return;}

let now=new Date();
ageUser=now.getFullYear()-parseInt(y);

let d=now.getDate();
let m=now.getMonth()+1;

let l1=(d+ageUser)%10;
let l2=(m+ageUser)%10;
let l3=(l1+l2+d)%10;

lucky=[l1,l2,l3];

document.getElementById("tuviBox").innerHTML=
`
📅 Ngày: ${d}/${m}<br>
👤 Tuổi: ${ageUser}<br>
⭐ Số may mắn: <b>${lucky.join(" - ")}</b>
`;
}

/* ================= RANDOM ================= */
function rand(max){
return Math.floor(Math.random()*max)+1;
}

/* ================= GENERATE ================= */
function smartPick(max,force){

let r=Math.random();

if(lucky.length>0 && r<force){
let p=lucky[Math.floor(Math.random()*lucky.length)];
return Math.min(max,Math.max(1,p+Math.floor(Math.random()*3)));
}

return rand(max);
}

function generate(mode){

let nums=[];

if(mode==="random"){
for(let i=0;i<6;i++) nums.push(rand(45));
}

else if(mode==="tuvi"){
for(let i=0;i<6;i++) nums.push(smartPick(45,0.7));
}

else{
for(let i=0;i<6;i++) nums.push(smartPick(45,0.9));
}

return nums;
}

/* ================= SCORE ================= */
function calcScore(nums){

let match=0;

nums.forEach(n=>{
if(lucky.includes(n%10)) match++;
});

/* điểm 0–100 */
return Math.min(100,match*20 + Math.floor(Math.random()*20));
}

/* ================= QUAY ================= */
function quay(){

let mode=document.getElementById("mode").value;
let result=document.getElementById("result");
let scoreBox=document.getElementById("score");

let nums=generate(mode);

result.innerHTML="";

let score=calcScore(nums);

nums.forEach(n=>{

let d=document.createElement("div");
d.className="ball";

/* HIGHLIGHT */
if(lucky.includes(n%10)){
d.classList.add("hot");
}

d.innerText=n.toString().padStart(2,"0");
result.appendChild(d);

});

scoreBox.innerHTML="📊 Độ hợp mệnh: <b>"+score+"/100</b>";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Full Pro 3.2</title>

<style>
body{
margin:0;
padding:15px;
font-family:Arial;
background:linear-gradient(135deg,#fff3cd,#ffe0b2);
text-align:center;
}

.header{
background:#c62828;
color:#ffeb3b;
padding:15px;
font-size:24px;
font-weight:bold;
border-radius:15px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
font-size:15px;
}

select,input{
border:2px solid #fbc02d;
}

button{
border:none;
background:#d32f2f;
color:#ffeb3b;
font-weight:bold;
cursor:pointer;
}

.ball{
width:55px;
height:55px;
display:inline-flex;
justify-content:center;
align-items:center;
border-radius:50%;
margin:5px;
font-size:20px;
font-weight:bold;
background:radial-gradient(circle,#fff176,#fbc02d);
}

.section{
font-weight:bold;
margin:10px 0;
color:#c62828;
}
</style>
</head>

<body>

<div class="header">🎰 VIETLOTT FULL PRO 3.2</div>

<!-- TỬ VI -->
<div class="card">

<div class="section">🔮 Tử vi</div>

<input id="name" placeholder="Họ tên">

<select id="gender">
<option>Nam</option>
<option>Nữ</option>
</select>

<input id="day" type="number" placeholder="Ngày">
<input id="month" type="number" placeholder="Tháng">
<input id="year" type="number" placeholder="Năm">

<select id="hour">
<option>Tý</option><option>Sửu</option><option>Dần</option>
<option>Mão</option><option>Thìn</option><option>Tỵ</option>
<option>Ngọ</option><option>Mùi</option><option>Thân</option>
<option>Dậu</option><option>Tuất</option><option>Hợi</option>
</select>

<button onclick="calcTuVi()">TÍNH TỬ VI</button>

<div id="tuviBox"></div>

</div>

<!-- VIETLOTT -->
<div class="card">

<div class="section">🎰 Vietlott</div>

<select id="game">
<option value="645">Mega 6/45</option>
<option value="655">Power 6/55</option>
<option value="3d">3D Max Pro</option>
</select>

<select id="mode">
<option value="random">🎲 Ngẫu nhiên</option>
<option value="tuvi">🔮 Tử vi</option>
<option value="hopmenh">🍀 Hợp mệnh</option>
</select>

<button onclick="quay()">QUAY NGAY</button>

</div>

<!-- RESULT -->
<div class="card">

<div class="section">🎯 Kết quả</div>
<div id="result"></div>
<div id="score"></div>

</div>

<script>

let lucky=[];

/* ================= TỬ VI ================= */
function calcTuVi(){

let d=+day.value;
let m=+month.value;
let y=+year.value;

if(!d||!m||!y){
alert("Nhập đủ ngày tháng năm");
return;
}

let age=new Date().getFullYear()-y;

lucky=[
(d+age)%45+1,
(m+age)%45+1,
(d+m+age)%45+1
];

tuviBox.innerHTML="⭐ Số may mắn: <b>"+lucky.join(" - ")+"</b>";
}

/* ================= RANDOM KHÔNG TRÙNG ================= */
function genUnique(max,count,source){

let arr=[];

while(arr.length<count){
let n;

if(source.length && Math.random()<0.6){
n=source[Math.floor(Math.random()*source.length)];
} else {
n=Math.floor(Math.random()*max)+1;
}

if(!arr.includes(n)){
arr.push(n);
}
}

return arr.sort((a,b)=>a-b);
}

/* ================= SPIN ================= */
function spin(el,max,final){

let t=setInterval(()=>{
el.innerText=Math.floor(Math.random()*max)+1;
},80);

setTimeout(()=>{
clearInterval(t);
el.innerText=final;
},1200);
}

/* ================= QUAY ================= */
function quay(){

let game=gameSelect.value;
let mode=modeSelect.value;

let max = game==="645"?45 : game==="655"?55 : 999;
let count = game==="3d"?2:6;

let nums;

if(mode==="random"){
nums=genUnique(max,count,[]);
}
else if(mode==="tuvi"){
nums=genUnique(max,count,lucky);
}
else{
nums=genUnique(max,count,lucky);
}

result.innerHTML="";
score.innerHTML="⏳ Đang quay...";

nums.forEach((n,i)=>{

let d=document.createElement("div");
d.className="ball";
result.appendChild(d);

setTimeout(()=>{
spin(d,max,n);
},i*200);

});

setTimeout(()=>{
score.innerHTML="✔ Hoàn tất!";
},2000);

}

let gameSelect=document.getElementById("game");
let modeSelect=document.getElementById("mode");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Pro SLOT FIX</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
padding:15px;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff7e6,#ffe9e9);
text-align:center;
}

.header{
background:#c62828;
color:white;
padding:15px;
border-radius:15px;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

select{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:2px solid #fbc02d;
}

.mainButton{
width:100%;
padding:15px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:12px;
background:#d32f2f;
color:white;
margin-top:10px;
cursor:pointer;
}

.ball{
width:60px;
height:60px;
background:radial-gradient(circle,#fff176,#fbc02d);
border-radius:50%;
display:inline-flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
margin:5px;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}

.number3d{
font-size:42px;
font-weight:bold;
color:#c62828;
margin:10px;
letter-spacing:5px;
}

.sectionTitle{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.historyItem{
text-align:left;
padding:8px;
border-bottom:1px solid #ddd;
font-size:14px;
}

.quickBox{
display:flex;
gap:10px;
margin-top:10px;
}

.quickBtn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#fbc02d;
font-weight:bold;
font-size:16px;
}
</style>

</head>

<body>

<div class="header">🎰 Vietlott Pro SLOT FIX</div>

<div class="card">

<div class="sectionTitle">Chọn trò chơi</div>

<select id="gameMode">
<option value="mega">Mega 6/45</option>
<option value="power">Power 6/55</option>
<option value="3d">3D Max Slot</option>
</select>

<button class="mainButton" onclick="quaySo()">🎲 QUAY NGAY</button>

</div>

<div class="card">
<div id="result">Chưa có kết quả</div>
</div>

<div class="card">
<div class="sectionTitle">📜 Lịch sử</div>
<div id="historyArea">Chưa có lịch sử</div>
</div>

<script>

let historyData=[];
let isRunning=false;

/* âm thanh nhẹ */
function tickSound(){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=ctx.createOscillator();
  let gain=ctx.createGain();

  osc.type="square";
  osc.frequency.value=900;
  gain.gain.value=0.03;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime+0.04);
}

/* SLOT ENGINE */
function slotSpin(el, final, max, delay, digits){

  let count=0;

  let t=setInterval(()=>{

    let fake=Math.floor(Math.random()*max)+1;

    el.innerText=fake.toString().padStart(digits,"0");

    tickSound();
    count++;

    if(count>18){
      clearInterval(t);
      el.innerText=final.toString().padStart(digits,"0");
    }

  },delay);
}

/* random không trùng */
function randomUnique(count,max){
  let arr=[];
  while(arr.length<count){
    let n=Math.floor(Math.random()*max)+1;
    if(!arr.includes(n)) arr.push(n);
  }
  arr.sort((a,b)=>a-b);
  return arr;
}

/* lịch sử */
function updateHistory(text){
  historyData.unshift(text);
  if(historyData.length>30) historyData.pop();

  document.getElementById("historyArea").innerHTML=
  historyData.map(i=>`<div class="historyItem">${i}</div>`).join("");
}

/* MAIN */
function quaySo(){

  if(isRunning) return;
  isRunning=true;

  let mode=document.getElementById("gameMode").value;
  let result=document.getElementById("result");
  result.innerHTML="";

  /* ================= MEGA ================= */
  if(mode==="mega"){

    let nums=randomUnique(6,45);

    result.innerHTML=`<div class="sectionTitle">🎰 Mega 6/45</div>`;

    nums.forEach(n=>{
      let d=document.createElement("div");
      d.className="ball";
      d.innerText="00";
      result.appendChild(d);

      setTimeout(()=>slotSpin(d,n,45,130,2),Math.random()*300);
    });

    setTimeout(()=>{
      updateHistory("Mega: "+nums.join("-"));
      isRunning=false;
    },2200);
  }

  /* ================= POWER ================= */
  else if(mode==="power"){

    let nums=randomUnique(6,55);

    result.innerHTML=`<div class="sectionTitle">⚡ Power 6/55</div>`;

    nums.forEach(n=>{
      let d=document.createElement("div");
      d.className="ball";
      d.innerText="00";
      result.appendChild(d);

      setTimeout(()=>slotSpin(d,n,55,130,2),Math.random()*350);
    });

    setTimeout(()=>{
      updateHistory("Power: "+nums.join("-"));
      isRunning=false;
    },2300);
  }

  /* ================= 3D SLOT ================= */
  else{

    let a=Math.floor(Math.random()*1000);
    let b=Math.floor(Math.random()*1000);

    let aFinal=a.toString().padStart(3,"0");
    let bFinal=b.toString().padStart(3,"0");

    result.innerHTML=`
      <div class="sectionTitle">🎯 3D SLOT MACHINE</div>
      <div class="number3d" id="a">000</div>
      <div class="number3d" id="b">000</div>
    `;

    let boxA=document.getElementById("a");
    let boxB=document.getElementById("b");

    slotSpin(boxA,aFinal,1000,150,3);

    setTimeout(()=>{
      slotSpin(boxB,bFinal,1000,160,3);
    },600);

    setTimeout(()=>{
      updateHistory("3D: "+aFinal+" | "+bFinal);
      isRunning=false;
    },2600);
  }
}

</script>

</body>
</html>

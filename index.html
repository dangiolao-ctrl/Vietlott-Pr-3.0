<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott Pro 5.0</title>

<style>
body{
margin:0;
padding:15px;
font-family:Arial;
background:linear-gradient(135deg,#fff3cd,#ffe0b2);
text-align:center;
}

.header{
background:#b71c1c;
color:#ffeb3b;
padding:15px;
font-size:24px;
font-weight:bold;
border-radius:15px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
font-size:15px;
}

button{
border:none;
background:#d32f2f;
color:#ffeb3b;
font-weight:bold;
cursor:pointer;
}

.ball{
width:55px;
height:55px;
display:inline-flex;
justify-content:center;
align-items:center;
border-radius:50%;
margin:5px;
font-size:20px;
font-weight:bold;
background:radial-gradient(circle,#fff176,#fbc02d);
}

.section{
font-weight:bold;
margin:10px 0;
color:#b71c1c;
}

.small{
font-size:13px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="header">🎰 VIETLOTT PRO 5.0</div>

<div class="card">

<div class="section">🎮 Chọn game</div>

<select id="game">
<option value="645">Mega 6/45</option>
<option value="655">Power 6/55</option>
<option value="3d">3D MPR</option>
</select>

<select id="mode">
<option value="random">🎲 Ngẫu nhiên</option>
<option value="tuvi">🔮 Tử vi</option>
</select>

<button onclick="quay()">QUAY NGAY</button>
<button onclick="toggleSound()" id="soundBtn">🔊 Âm thanh: BẬT</button>

</div>

<div class="card">

<div class="section" id="label">🎯 Kết quả</div>
<div id="result"></div>
<div id="status"></div>

</div>

<div class="card">

<div class="section">📊 Thống kê</div>
<div id="stats"></div>

</div>

<div class="card">

<div class="section">📜 Lịch sử</div>

<div class="small">Mega 6/45</div>
<div id="h645"></div>

<div class="small">Power 6/55</div>
<div id="h655"></div>

<div class="small">3D MPR</div>
<div id="h3d"></div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("vietlott_v5") || "{}");
let soundOn = true;
let allNumbers = [];

function save(){
localStorage.setItem("vietlott_v5", JSON.stringify(history));
}

/* ================= SOUND ================= */
function beep(){
if(!soundOn) return;
let audio = new Audio("click.mp3");
audio.play();
}

function toggleSound(){
soundOn = !soundOn;
document.getElementById("soundBtn").innerText =
soundOn ? "🔊 Âm thanh: BẬT" : "🔇 Âm thanh: TẮT";
}

/* ================= RANDOM ================= */
function rand(max){
return Math.floor(Math.random()*max)+1;
}

function unique(max,count){
let arr=[];
while(arr.length<count){
let n=rand(max);
if(!arr.includes(n)) arr.push(n);
}
return arr.sort((a,b)=>a-b);
}

/* ================= GENERATE ================= */
function gen(game,mode){

let max = game==="645"?45 : game==="655"?55 : 999;
let count = game==="3d"?2:6;

let source = mode==="tuvi" ? [3,6,9,18,27,36] : [];

let arr=[];

while(arr.length<count){
let n = source.length && Math.random()<0.5
? source[Math.floor(Math.random()*source.length)]
: rand(max);

if(!arr.includes(n)){
arr.push(n);
allNumbers.push(n);
}
}

return arr.sort((a,b)=>a-b);
}

/* ================= QUAY ================= */
function quay(){

beep();

let game = gameSelect.value;
let mode = modeSelect.value;

let label =
game==="645" ? "Mega 6/45" :
game==="655" ? "Power 6/55" :
"3D MPR";

document.getElementById("label").innerHTML = "🎯 " + label;

let nums = gen(game,mode);

let box = document.getElementById("result");
box.innerHTML = "";

nums.forEach((n,i)=>{

let d = document.createElement("div");
d.className="ball";
box.appendChild(d);

setTimeout(()=>{
d.innerText = n;
beep();
}, i*200);

});

/* history */
if(!history[game]) history[game]=[];

history[game].unshift(nums.join(" - "));
if(history[game].length>10) history[game].pop();

save();
renderHistory();
renderStats();

document.getElementById("status").innerHTML="✔ Hoàn tất!";
}

/* ================= STATS ================= */
function renderStats(){

let count={};

allNumbers.forEach(n=>{
count[n]=(count[n]||0)+1;
});

let sorted = Object.entries(count)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

document.getElementById("stats").innerHTML =
"🔥 Hot numbers:<br>" +
sorted.map(x=>x[0]+" ("+x[1]+")").join("<br>");
}

/* ================= HISTORY ================= */
function renderHistory(){

document.getElementById("h645").innerHTML =
(history["645"]||[]).join("<br>");

document.getElementById("h655").innerHTML =
(history["655"]||[]).join("<br>");

document.getElementById("h3d").innerHTML =
(history["3d"]||[]).join("<br>");
}

renderHistory();

let gameSelect=document.getElementById("game");
let modeSelect=document.getElementById("mode");

</script>

</body>
</html>
